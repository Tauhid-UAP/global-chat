name: Release Chat Service

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g.,v1.0.0)"
        required: true

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}/chat

jobs:
  build:
    runs-on: ununtu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate version format
        run: |
          if [[ ! "${{ github.event.inputs.version }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
          echo "Invalid version format. Use vX.Y.Z"
          exit 1
          fi

      - name: Verify tag exists
        run: |
          TAG="services/chat/${{ github.event.inputs.version }}"
          git fetch --tags
          if ! git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG does not exist!"
            exit 1
          fi
          echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_ENV

      - name: Checkout tag
        run: |
          git checkout services/chat/${{ github.event.inputs.version }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./services/chat
          file: ./services/chat/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.VERSION }}
            ${{ env.IMAGE_NAME }}:latest
          build-args: |
            VERSION=${{ env.VERSION }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{secrets.AWS_ACCOUNT_ID}}:role/${{secrets.AWS_ROLE}}
          aws-region: ${{secrets.AWS_REGION}}

      - name: Upload static assets
        run: |
          aws s3 sync services/chat/static/ \
           s3://${{secrets.ARTIFACT_BUCKET}}/global-chat-static/${VERSION}/ \
           --delete

