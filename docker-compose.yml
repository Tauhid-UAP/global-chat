services:
  db:
    image: postgres:16
    env_file: ./services/chat/.env
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    command: redis-server --save 60 1 --loglevel warning

  web:
    build:
      context: .
      dockerfile: ./services/chat/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./services/chat/.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ~/.aws:/root/.aws:ro
      - ./services/chat/static/:/app/static:ro
    restart: unless-stopped

  migrate:
    build: .
    profiles: ["tools"]
    env_file:
      - ./services/chat/.env
    command: >
      sh -c "migrate -path /app/migrations -database $$DATABASE_URL up"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
